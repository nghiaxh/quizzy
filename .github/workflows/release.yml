name: Release

on:
  push:
    tags: ["[0-9]*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g., 0.3.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: "release"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Derive tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi
      - name: Derive version
        id: version
        run: |
          echo "version=${{ steps.tag.outputs.tag }}" >> $GITHUB_OUTPUT
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          node .github/scripts/extract-changelog.js "$VERSION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build-tauri:
    needs: [prepare]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Build Tauri
        run: npm run tauri build
      - name: Upload Tauri bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ runner.os }}
          path: src-tauri/target/release/bundle/

  release:
    needs: [prepare, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect setup files
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -iname "*.exe" -o -iname "*.msi" -o -iname "*.deb" -o -iname "*.rpm" -o -iname "*.AppImage" -o -iname "*.dmg" \) -exec cp {} release-assets/ \;
          ls -la release-assets/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Quizzy v${{ needs.prepare.outputs.version }}
          body: ${{ needs.prepare.outputs.changelog }}
          files: |
            release-assets/*.exe
            release-assets/*.msi
            release-assets/*.deb
            release-assets/*.rpm
            release-assets/*.AppImage
            release-assets/*.dmg
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
