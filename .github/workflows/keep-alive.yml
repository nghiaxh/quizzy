name: Supabase Keep-Alive

on:
  schedule:
    - cron: "0 8 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase project
        shell: bash
        run: |
          curl -sf -o /dev/null \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            && echo "OK" || echo "FAIL"
